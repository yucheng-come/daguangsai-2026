<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>万物皆有答案 - 千问大模型</title>
<link rel="stylesheet" href="../shared/styles.css">
<style>
  .screen{display:none;flex-direction:column;min-height:100vh;min-height:100dvh}
  .screen.on{display:flex}

  /* === 开场 === */
  .splash{justify-content:center;align-items:center;text-align:center;gap:40px;padding-top:8vh}
  .splash-icon{font-size:72px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 40px rgba(255,106,0,0.3))}
  .splash-title{font-size:2.5rem;font-weight:900;letter-spacing:-0.04em;line-height:1.1}
  .splash-desc{font-size:1rem;color:var(--t-2);max-width:300px;line-height:1.9}
  .style-chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .style-chip{
    padding:10px 18px;border-radius:var(--r-full);font-size:0.8125rem;cursor:pointer;
    border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);
    color:var(--t-2);transition:all 0.25s var(--ease-out-expo);white-space:nowrap;
  }
  .style-chip.on{
    border-color:var(--c-orange);background:rgba(255,106,0,0.12);
    color:var(--c-orange-bright);box-shadow:0 0 20px rgba(255,106,0,0.1);
  }

  /* === 上传 === */
  .upload-screen{gap:24px;padding-top:20px}
  .upload-zone{
    width:100%;aspect-ratio:1;max-width:340px;margin:0 auto;
    border:2px dashed rgba(255,255,255,0.1);border-radius:var(--r-2xl);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;cursor:pointer;transition:all 0.4s var(--ease-out-expo);
    background:rgba(255,255,255,0.02);position:relative;overflow:hidden;
  }
  .upload-zone:hover{border-color:rgba(255,106,0,0.4);background:rgba(255,106,0,0.03)}
  .upload-zone.has-img{border-style:solid;border-color:rgba(255,106,0,0.5)}
  .upload-zone img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .upload-zone-icon{font-size:48px;opacity:0.5;transition:all 0.3s}
  .upload-zone-text{font-size:0.9375rem;color:var(--t-3)}
  .upload-actions{display:flex;gap:12px;max-width:340px;margin:0 auto;width:100%}
  .upload-actions .btn{flex:1}

  /* === 扫描 === */
  .scan-screen{justify-content:center;align-items:center;text-align:center;gap:36px}
  .scan-orb{
    width:160px;height:160px;border-radius:50%;position:relative;
    background:rgba(255,106,0,0.05);border:1px solid rgba(255,106,0,0.15);
    display:flex;align-items:center;justify-content:center;
  }
  .scan-ring{
    position:absolute;inset:-20px;border-radius:50%;
    border:1.5px solid rgba(255,106,0,0.2);
    animation:scanExpand 2.2s ease-out infinite;
  }
  .scan-ring:nth-child(2){animation-delay:0.7s}
  .scan-ring:nth-child(3){animation-delay:1.4s}
  @keyframes scanExpand{
    0%{transform:scale(0.6);opacity:0.6}
    100%{transform:scale(1.6);opacity:0}
  }
  .scan-emoji{font-size:56px;position:relative;z-index:1;animation:float 2s ease-in-out infinite}
  .scan-status{font-size:1rem;color:var(--t-2);letter-spacing:0.02em}

  /* === 结果 === */
  .result-screen-r{gap:24px;padding-bottom:120px}
  .result-img-wrap{
    width:220px;height:220px;margin:0 auto;border-radius:var(--r-xl);
    overflow:hidden;position:relative;
    box-shadow:0 0 0 1px rgba(255,106,0,0.15),0 20px 60px rgba(0,0,0,0.5);
  }
  .result-img-wrap img{width:100%;height:100%;object-fit:cover}
  .result-img-wrap::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(180deg,transparent 60%,rgba(0,0,0,0.5));
  }
  .monologue-card{
    background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
    border-radius:var(--r-xl);padding:32px 28px;
    position:relative;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  }
  .monologue-card::before{
    content:'\201C';position:absolute;top:8px;left:20px;
    font-size:72px;color:var(--c-orange);opacity:0.15;
    font-family:Georgia,serif;line-height:1;
  }
  .monologue-text-r{
    font-size:1.0625rem;line-height:2;color:var(--t-1);
    padding-left:16px;font-style:italic;min-height:60px;
  }
  .monologue-tag{
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 14px;border-radius:var(--r-full);
    font-size:0.75rem;background:rgba(255,106,0,0.1);
    color:var(--c-orange-bright);margin-top:20px;
  }
  .result-actions-r{display:flex;gap:12px}
  .result-actions-r .btn{flex:1}

  /* === 底部固定 === */
  .bottom-bar{
    position:fixed;bottom:0;left:0;right:0;z-index:10;
    padding:16px 20px calc(16px + env(safe-area-inset-bottom,0px));
    background:linear-gradient(to top,var(--bg-base) 50%,transparent);
    text-align:center;
  }
  .bottom-bar .slogan-tag{
    font-size:0.8125rem;font-weight:600;
    background:var(--grad-brand);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;background-clip:text;
  }

  #imageInput{display:none}

  /* === Dots loading === */
  .dots{display:flex;gap:5px;justify-content:center}
  .dots span{width:6px;height:6px;border-radius:50%;background:var(--c-orange);animation:dotBounce 1.4s ease-in-out infinite both}
  .dots span:nth-child(1){animation-delay:-0.32s}
  .dots span:nth-child(2){animation-delay:-0.16s}
  @keyframes dotBounce{0%,80%,100%{transform:scale(0.3);opacity:0.3}40%{transform:scale(1);opacity:1}}

  /* === 桌面端 === */
  @media (min-width: 768px) {
    .splash-title{font-size:3rem}
    .splash-icon{font-size:88px}
    .upload-zone{max-width:420px}
    .result-img-wrap{width:280px;height:280px}
    .monologue-text-r{font-size:1.1875rem}
  }
  @media (min-width: 1024px) {
    .splash{padding-top:12vh;gap:48px}
    .splash-title{font-size:3.5rem}
    .splash-icon{font-size:100px}
    .upload-screen{flex-direction:row;flex-wrap:wrap;justify-content:center;align-items:flex-start;gap:32px}
    .upload-screen h2,.upload-screen>p{width:100%}
    .upload-zone{max-width:340px}
    .upload-actions{max-width:500px}
    .result-screen-r{flex-direction:row;flex-wrap:wrap;justify-content:center;align-items:flex-start;gap:28px}
    .result-screen-r .nav-bar{width:100%}
    .result-img-wrap{width:300px;height:300px;flex-shrink:0}
    .monologue-card{flex:1;min-width:320px}
    .result-actions-r{width:100%;max-width:640px;justify-content:center}
    .result-screen-r .btn-ghost{width:100%;text-align:center}
  }
  @media (min-width: 1440px) {
    .splash-title{font-size:4rem}
    .upload-zone{max-width:400px}
    .result-img-wrap{width:360px;height:360px}
    .monologue-text-r{font-size:1.25rem}
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow-orb glow-orb-o"></div>
<div class="glow-orb glow-orb-b"></div>

<!-- ====== 开场 ====== -->
<div class="page-wrap screen on" id="splash">
  <div class="nav-bar anim-fade-up">
    <div class="nav-brand"><div class="nav-dot"></div><span class="nav-label">阿里云 × 千问</span></div>
  </div>
  <div class="splash">
    <div class="splash-icon anim-scale-in">🔮</div>
    <h1 class="splash-title anim-fade-up d-1">
      <span class="text-gradient">万物皆有答案</span>
    </h1>
    <p class="splash-desc anim-fade-up d-2">
      拍下身边任何一件物品<br>千问大模型将赋予它灵魂，<br>用你选的风格，讲述自己的故事
    </p>
    <div class="style-chips anim-fade-up d-3" id="styleChips">
      <button class="style-chip on" data-s="literary">🎭 王家卫文艺</button>
      <button class="style-chip" data-s="scifi">🚀 科幻未来</button>
      <button class="style-chip" data-s="humor">🎪 脱口秀吐槽</button>
      <button class="style-chip" data-s="poetic">🌸 诗意古风</button>
    </div>
  </div>
  <div class="bottom-bar anim-fade-up d-4">
    <button class="btn btn-primary btn-lg btn-block" onclick="goUpload()" style="max-width:360px;margin:0 auto">
      拍一张，万物皆答 →
    </button>
  </div>
</div>

<!-- ====== 上传 ====== -->
<div class="page-wrap screen" id="upload">
  <div class="nav-bar">
    <div class="nav-brand"><div class="nav-dot"></div><span class="nav-label">万物皆有答案</span></div>
    <button class="btn btn-ghost" onclick="goSplash()">← 返回</button>
  </div>
  <div class="upload-screen">
    <h2 class="anim-fade-up" style="text-align:center;font-size:1.25rem">选一件身边的物品</h2>
    <p class="anim-fade-up d-1" style="text-align:center;color:var(--t-3);font-size:0.875rem">
      水杯 · 台灯 · 书 · 钥匙 · 盆栽 · 任何日常之物
    </p>
    <div class="upload-zone anim-fade-up d-2" id="zone" onclick="document.getElementById('imageInput').click()">
      <span class="upload-zone-icon" id="zoneIcon">📷</span>
      <span class="upload-zone-text" id="zoneText">点击拍照或选择照片</span>
    </div>
    <input type="file" id="imageInput" accept="image/*" capture="environment" onchange="onFile(event)">
    <div class="upload-actions anim-fade-up d-3">
      <button class="btn btn-glass" onclick="document.getElementById('imageInput').click()">🖼️ 相册</button>
      <button class="btn btn-primary" id="btnGo" disabled onclick="goScan()">✨ 千问解析</button>
    </div>
  </div>
</div>

<!-- ====== 扫描 ====== -->
<div class="page-wrap screen" id="scan">
  <div class="scan-screen">
    <div class="scan-orb anim-scale-in">
      <div class="scan-ring"></div><div class="scan-ring"></div><div class="scan-ring"></div>
      <span class="scan-emoji">🔍</span>
    </div>
    <p class="scan-status anim-fade-up d-1" id="scanMsg">千问正在识别这个物品...</p>
    <div class="dots anim-fade-up d-2"><span></span><span></span><span></span></div>
  </div>
</div>

<!-- ====== 结果 ====== -->
<div class="page-wrap screen" id="result">
  <div class="nav-bar">
    <div class="nav-brand"><div class="nav-dot"></div><span class="nav-label">千问大模型</span></div>
  </div>
  <div class="result-screen-r">
    <div class="result-img-wrap anim-scale-in" id="resultImgWrap">
      <img id="resultImg" src="" alt="">
    </div>
    <div class="monologue-card anim-fade-up d-1">
      <p class="monologue-text-r" id="monoText"></p>
      <span class="monologue-tag" id="monoTag"></span>
    </div>
    <div class="result-actions-r anim-fade-up d-2">
      <button class="btn btn-glass" onclick="retry()">🎭 换个风格</button>
      <button class="btn btn-primary" onclick="share()">📤 分享</button>
    </div>
    <button class="btn btn-ghost anim-fade-up d-3" onclick="goUpload()" style="align-self:center">🔄 再拍一张</button>
  </div>
  <div class="bottom-bar">
    <span class="slogan-tag">千问一下，万物皆答</span>
    <span style="color:var(--t-3);margin-left:8px;font-size:0.75rem">— 阿里云千问大模型</span>
  </div>
</div>

<script src="../shared/utils.js"></script>
<script>
const $ = id => document.getElementById(id);
const S = {
  style: 'literary',
  image: null,
  mono: '',
  objType: ''
};

// === 风格配置 ===
const STYLES = {
  literary: {
    name: '王家卫文艺', emoji: '🎭',
    prompt: '你是一个被赋予灵魂的日常物品。用王家卫电影般的文艺腔调，以第一人称讲述你的存在。语速缓慢，充满意象和细节（如时间、温度、光线），带着温柔的孤独感。150字以内，让人读完后想截图分享。'
  },
  scifi: {
    name: '科幻未来', emoji: '🚀',
    prompt: '你是一个来自未来的智能物品，拥有超越时代的自我意识。用科幻小说的语气，以第一人称介绍你的功能和使命。使用技术术语但保持诗意，充满未来主义色彩。150字以内。'
  },
  humor: {
    name: '脱口秀吐槽', emoji: '🎪',
    prompt: '你是一个会吐槽的日常物品，用脱口秀演员的方式，以第一人称调侃自己的日常和与人类的相处。幽默风趣，有梗，让人会心一笑。150字以内。'
  },
  poetic: {
    name: '诗意古风', emoji: '🌸',
    prompt: '你是一个拥有古典灵魂的物品，用中国古风诗意的方式，以第一人称吟诵你的存在。半文半白，有意境，有留白，像一首小诗。融入传统文化意象。150字以内。'
  }
};

// === 导航 ===
function goScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('on'));
  $(id).classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}
function goSplash() { goScreen('splash'); }
function goUpload() {
  S.image = null; S.mono = '';
  $('zone').classList.remove('has-img');
  $('zoneIcon').style.display = '';
  $('zoneText').textContent = '点击拍照或选择照片';
  $('btnGo').disabled = true;
  const old = $('zone').querySelector('img');
  if (old) old.remove();
  goScreen('upload');
}
function goScan() { goScreen('scan'); }

// === 风格选择 ===
$('styleChips').addEventListener('click', e => {
  const c = e.target.closest('.style-chip');
  if (!c) return;
  $('styleChips').querySelectorAll('.style-chip').forEach(x => x.classList.remove('on'));
  c.classList.add('on');
  S.style = c.dataset.s;
});

// === 图片 ===
function onFile(e) {
  const f = e.target.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    S.image = ev.target.result;
    const old = $('zone').querySelector('img');
    if (old) old.remove();
    const img = document.createElement('img');
    img.src = S.image;
    $('zone').appendChild(img);
    $('zone').classList.add('has-img');
    $('zoneIcon').style.display = 'none';
    $('zoneText').textContent = '点击更换照片';
    $('btnGo').disabled = false;
  };
  r.readAsDataURL(f);
  S.fileName = f.name;
}

// === 核心：AI分析 ===
async function goScan() {
  if (!S.image) return;
  goScreen('scan');

  const msgs = [
    '千问正在识别物品...',
    '分析形态与材质...',
    '理解物品的故事语境...',
    '注入' + STYLES[S.style].name + '灵魂...',
    '生成独白中...'
  ];
  for (let i = 0; i < msgs.length; i++) {
    $('scanMsg').textContent = msgs[i];
    await delay(600 + Math.random() * 500);
  }

  // 真实千问API
  const objType = guessObj(S.fileName || '');
  S.objType = objType;
  const styleData = STYLES[S.style];
  const prompt = `请以第一人称写一段独白。物品是：${objType}。要求：${styleData.prompt}`;

  const aiResp = await callQianwenAPI(prompt, {
    systemPrompt: styleData.prompt,
    temperature: 0.9,
    maxTokens: 400
  });

  S.mono = aiResp || getDemo(objType, S.style);
  S.objType = objType;

  $('resultImg').src = S.image;
  typeText($('monoText'), S.mono);
  $('monoTag').textContent = styleData.emoji + ' ' + styleData.name + '风格';

  await delay(400);
  goScreen('result');
}

// === 打字效果 ===
async function typeText(el, text) {
  el.textContent = '';
  for (let i = 0; i < text.length; i++) {
    el.textContent += text[i];
    if (i % 3 === 0) await delay(15);
  }
}

// === 换风格 ===
async function retry() {
  const keys = Object.keys(STYLES);
  const idx = (keys.indexOf(S.style) + 1) % keys.length;
  S.style = keys[idx];
  $('styleChips').querySelectorAll('.style-chip').forEach(c => c.classList.toggle('on', c.dataset.s === S.style));
  goScreen('scan');
  $('scanMsg').textContent = '用' + STYLES[S.style].name + '重新演绎...';
  await delay(1200);

  const sd = STYLES[S.style];
  const prompt = `请以第一人称写一段独白。物品是一个${S.objType || '日常物品'}。${sd.prompt}`;
  const aiResp = await callQianwenAPI(prompt, { systemPrompt: sd.prompt, temperature: 0.9, maxTokens: 400 });
  S.mono = aiResp || getDemo(S.objType, S.style);
  typeText($('monoText'), S.mono);
  $('monoTag').textContent = sd.emoji + ' ' + sd.name + '风格';
  await delay(300);
  goScreen('result');
}

// === 分享 ===
async function share() {
  await shareContent(
    '万物皆有答案 - 千问大模型',
    `千问了一下，万物皆有答案 ✨\n「${S.mono}」\n—— 阿里云千问大模型 × 第18届大广赛`,
    window.location.href
  );
}

// === 辅助 ===
function guessObj(name) {
  const m = {
    '杯|cup|mug|coffee|tea|drink': '一个马克杯',
    '花|植物|plant|flower|leaf|绿|grass': '一盆绿植',
    '键盘|keyboard|key|键': '一个机械键盘',
    '灯|lamp|light|光': '一盏台灯',
    '手机|phone|iphone': '一部手机',
    '书|book|read': '一本书',
    '笔|pen|pencil|write': '一支笔',
    '耳机|headphone|earphone|airpod': '一副耳机',
    '眼镜|glass|spec': '一副眼镜',
    '手表|watch': '一块手表',
  };
  const n = (name || '').toLowerCase();
  for (const [k, v] of Object.entries(m)) {
    if (new RegExp(k).test(n)) return v;
  }
  const all = ['一个马克杯','一盆绿植','一个机械键盘','一盏台灯','一部手机','一本书','一副耳机'];
  return all[Math.floor(Math.random() * all.length)];
}

function getDemo(obj, style) {
  const d = {
    literary: {
      '马克杯': '每天下午三点，她准时端起我。水温刚好，45度，她最喜欢的温度。我看着她的嘴唇轻轻碰到杯沿，那一瞬间，整个世界都安静下来。有些温度，不是用来测量的，是用来记住的。',
      '绿植': '我站在窗台上看了他三年。他每天早晨打开窗帘的时候，是我最期待的一秒。他从来不知道，我偷偷把他的咖啡香存进了每一片叶子里。',
    },
  };
  const fallback = '我就这样存在着，日复一日。被使用，被放置，被偶尔注视。但我有自己的温度，自己的节奏。你不必知道，因为我的故事，只属于我。';
  return d[style]?.[obj] || d.literary?.[obj] || fallback;
}

// init
goScreen('splash');
</script>
</body>
</html>
